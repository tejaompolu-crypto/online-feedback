<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="card">
        <h1>We'd love your feedback</h1>
        <p class="subtitle">Share your thoughts and help us improve.</p>

        <form id="feedback-form" novalidate>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name">
                <div class="error-text"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com">
                <div class="error-text"></div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="general">General</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                </select>
            </div>

            <div class="form-group">
                <label>Rating</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5" title="5 stars">&#9733;</label>
                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4" title="4 stars">&#9733;</label>
                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3" title="3 stars">&#9733;</label>
                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2" title="2 stars">&#9733;</label>
                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1" title="1 star">&#9733;</label>
                </div>
                <div class="error-text" id="rating-error">Please select a rating</div>
            </div>

            <div class="form-group">
                <label for="feedback-text">Your Feedback</label>
                <textarea id="feedback-text" rows="4" placeholder="Tell us what you think..."></textarea>
                <div class="error-text"></div>
            </div>

            <button type="submit" class="btn btn-primary" id="submit-btn">Submit Feedback</button>
        </form>
    </div>

    <p class="footer-link"><a href="{{ url_for('admin_login') }}">Admin</a></p>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
